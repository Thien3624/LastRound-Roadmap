name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # trigger khi push lên main
  workflow_dispatch:  # cho phép trigger thủ công từ GitHub UI

# Cấp quyền cho workflow đọc repo và deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho 1 deployment chạy tại 1 thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
        # Output sẽ nằm ở ./dist

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build          # chạy sau khi build xong
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
